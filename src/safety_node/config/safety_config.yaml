safety_node:
  ros__parameters:
    gpio_chip: "/dev/gpiochip0"
    gpio_line: 18
    active_low: false
    debounce_ms: 50
    publish_rate_hz: 20.0
    recovery_timeout_sec: 2.0
    start_latch_enabled: true
    start_latch_port: "/dev/ttyACM0"
    start_latch_baudrate: 115200
    start_latch_pin: 28
    start_latch_pullup: true
    start_latch_trigger_value: 0
    start_latch_debounce_ms: 50
    start_match_service: "/game/start_match"
    match_active_topic: "/game/match_active"
    require_safe_on_for_match_start: true
