bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 50
    default_server_timeout: 20
    transform_tolerance: 0.3
    enable_groot_monitoring: False
    default_nav_to_pose_bt_xml: /home/ovoleur/holonomic_robot/src/holonomic_robot_bringup/config/bt_nav_to_pose_no_fallback.xml
    default_nav_through_poses_bt_xml: /home/ovoleur/holonomic_robot/src/holonomic_robot_bringup/config/bt_nav_through_poses_no_fallback.xml
    error_code_names:
      - follow_path_error_code
      - compute_path_error_code

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.02
    min_y_velocity_threshold: 0.02
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    current_goal_checker: "goal_checker"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.10
      stateful: True

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 30
      model_dt: 0.05
      batch_size: 1000
      vx_std: 0.18
      vy_std: 0.18
      wz_std: 0.35
      vx_max: 1.0
      vx_min: -1.0
      vy_min: -1.0
      vy_max: 1.0
      wz_max: 3.14
      iteration_count: 1
      prune_distance: 1.0
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.01
      motion_model: "Omni"
      visualize: false
      critics: ["ConstraintCritic", "CostCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "TwirlingCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.0
        critical_weight: 10.0
        consider_footprint: true
        collision_cost: 10000.0
        collision_margin_distance: 0.05
        near_goal_distance: 0.3
        inflation_radius: 0.20
        cost_scaling_factor: 5.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_consider: 0.9
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 12
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        offset_from_furthest: 5
        threshold_to_consider: 1.0
      TwirlingCritic:
        enabled: false
        twirling_cost_power: 1
        twirling_cost_weight: 0.3

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: "[[0.15, 0.0], [0.138, 0.057], [0.106, 0.106], [0.057, 0.138], [0.0, 0.15], [-0.057, 0.138], [-0.106, 0.106], [-0.138, 0.057], [-0.15, 0.0], [-0.138, -0.057], [-0.106, -0.106], [-0.057, -0.138], [0.0, -0.15], [0.057, -0.138], [0.106, -0.106], [0.138, -0.057]]" 
      footprint_padding: 0.02
      transform_tolerance: 0.3
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          sensor_frame: base_scan
          data_type: LaserScan
          obstacle_max_range: 4.0
          obstacle_min_range: 0.13
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          min_obstacle_height: 0.0
          clearing: true
          marking: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 3.0
        inflation_radius: 0.20
        inflate_unknown: false
        inflate_around_unknown: false
      always_send_full_costmap: True
  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: False
      footprint: "[[0.15, 0.0], [0.138, 0.057], [0.106, 0.106], [0.057, 0.138], [0.0, 0.15], [-0.057, 0.138], [-0.106, 0.106], [-0.138, 0.057], [-0.15, 0.0], [-0.138, -0.057], [-0.106, -0.106], [-0.057, -0.138], [0.0, -0.15], [0.057, -0.138], [0.106, -0.106], [0.138, -0.057]]" 
      footprint_padding: 0.02
      resolution: 0.05
      track_unknown_space: true
      transform_tolerance: 0.3
      plugins: ["static_layer", "custom_objects_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: true
      custom_objects_layer:
        plugin: "custom_objects_layer::CustomObjectsLayer"
        enabled: true
        topic: "/custom_objects"
        object_size_x: 0.15
        object_size_y: 0.20
        lethal_cost: 254
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        cost_scaling_factor: 10.0
        inflation_radius: 0.16
        inflate_unknown: false
        inflate_around_unknown: false
      always_send_full_costmap: True
  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true
      transform_tolerance: 0.3

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.3
    use_sim_time: False
    simulate_ahead_time: 1.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 3.0

behavior_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower_rclcpp_node:
  ros__parameters:
    use_sim_time: False

collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 5.0
    source_timeout: 5.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.02
      min_points: 6
      visualize: True
      enabled: True
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.05
      max_height: 0.5
      enabled: True

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: False
    autostart: True
    node_names: ['controller_server', 'planner_server', 'behavior_server', 'bt_navigator', 'waypoint_follower']

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: False
    autostart: True
    node_names: ['map_server']
