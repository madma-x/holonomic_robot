/**:
  ros__parameters:
    # ── Camera ─────────────────────────────────────────────────────────────────
    # Topic published by your rpicam/image_transport bridge
    camera_topic: "/camera/image_raw"

    # ── ArUco ──────────────────────────────────────────────────────────────────
    # Marker physical size in metres (measure the printed square)
    marker_size: 0.029

    # cv::aruco predefined dictionary ID
    #    0 = DICT_4X4_50
    #    2 = DICT_4X4_250
    #    7 = DICT_5X5_250
    #   10 = DICT_6X6_250
    aruco_dict: 0

    # ── Performance ────────────────────────────────────────────────────────────
    target_fps: 30.0

    # Drop incoming frames when the detection queue is full (prevents build-up)
    frame_skip_on_lag: true

    # CPU core assignments (Raspberry Pi 4 has cores 0-3)
    core_capture: 0   # ROS2 spin / image callback
    core_detect:  1   # ArUco detection
    core_publish: 2   # Publish tracked detections

    # ── Camera calibration ─────────────────────────────────────────────────────
    # Replace with values from `ros2 run camera_calibration cameracalibrator`
    # Format: [fx, 0, cx,  0, fy, cy,  0, 0, 1]
    camera_matrix: [ 928.42874385853543, 0., 300.32818659102304, 0.,
       1404.1734597451064, 240.69320357106727, 0., 0., 1. ]
    # Distortion coefficients [k1, k2, p1, p2, k3]
    dist_coeffs: [ -0.53427631218350147, -0.46292941643821978,
       0.02605518394678898, 0.011535150294048427, 5.5380366706534652 ]
