# Theoretical location catalog for pick-and-place planning
# - `pick_locations`: all possible pickup targets with linked approach positions
# - `drop_locations`: all possible drop targets with linked approach positions
#
# Priority convention:
# - Higher `priority` = preferred first for pick locations
# - Lower `priority` = preferred first for drop locations

