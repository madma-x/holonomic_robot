  - id: "pick_A"
    name: "Pick A"
    priority: 100
    location:
      x: 1.00
      y: 0.50
      theta: 0.00
    approach_positions:
      - id: "pick_A_app_1"
        priority: 1
        pose:
          x: 1.30
          y: 0.50
          theta: 0.00
      - id: "pick_A_app_2"
