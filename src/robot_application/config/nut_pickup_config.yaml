# Nut pickup mission configuration
# All positions are in meters (field: x=[0,3.0], y=[0,2.0])
# The robot arm center is arm_offset_m (0.30 m) ahead of the robot center
# at 0-degree orientation (robot's +x direction).
# For each approach the robot navigates to the nav2_pose, then visual
# servoing (AlignToCluster) fine-tunes alignment before pumps are engaged.
# Drop robot_pose values are pre-computed so the arm center lands on the
# drop zone center: robot_x = zone_x - arm_offset * cos(theta),
#                              robot_y = zone_y - arm_offset * sin(theta)

nut_pickup:
  # Side set at runtime via ROS2 parameter; values: "yellow" | "blue"
  robot_side: "yellow"

  # Arm geometry (meters)
  arm_offset_m: 0.30

  # Number of vacuum pumps on the arm (one per arm slot)
  num_pumps: 4

  # Time (seconds) to wait after navigation before checking for tags
  tag_detection_wait_sec: 0.5

  # Visual-servoing alignment threshold (meters) passed to AlignToCluster
  alignment_threshold_m: 0.02

  # Time (seconds) to hold vacuum after pump activation (build-up delay)
  pump_buildup_sec: 0.5

  # Distance (meters) the robot backs up after dropping objects
  backup_dist_m: 0.30

  # ── Nut pickup targets ────────────────────────────────────────────────────
  # cluster_id must match the cluster_id broadcast by aruco_manager for
  # the group of tags placed on each nut.
  nuts:
    - id: "nut_a"
      cluster_id: 0
      center: {x: 2.825, y: 1.200}  # field position of nut (informational)
      approaches:
        # Robot navigates to this pose, arm (0.30 m ahead) faces the nut.
        # Visual servoing corrects the residual offset.
        - name: "south"
          nav2_pose: {x: 2.700, y: 1.200, theta: 0.0}  # facing +x (east)

    - id: "nut_b"
      cluster_id: 1
      center: {x: 1.850, y: 0.800}
      approaches:
        # theta = atan2(0.800-1.000, 1.850-2.200) ≈ -2.619 rad
        - name: "approach_1"
          nav2_pose: {x: 2.200, y: 1.000, theta: -2.619}
        # theta = atan2(0.800-0.600, 1.850-2.200) ≈ 2.619 rad
        - name: "approach_2"
          nav2_pose: {x: 2.200, y: 0.600, theta: 2.619}

  # ── Drop zones ────────────────────────────────────────────────────────────
  # robot_pose = position where the robot center must be so that the arm
  # center (0.30 m ahead) lands exactly on the drop zone center.
  # robot_x = center_x - arm_offset * cos(theta)
  # robot_y = center_y - arm_offset * sin(theta)
  drop_zones:
    - id: "zone_a"
      center: {x: 1.750, y: 1.450}
      size: {width: 0.200, height: 0.150}
      approaches:
        # "east" access: robot comes from the east, faces west (theta = π)
        # robot_x = 1.750 - 0.30 * cos(π) = 1.750 + 0.30 = 2.050
        - name: "east"
          robot_pose: {x: 2.050, y: 1.450, theta: 3.14159}

    - id: "zone_b"
      center: {x: 1.500, y: 0.800}
      size: {width: 0.200, height: 0.150}
      approaches:
        # "east" access: robot_x = 1.500 + 0.30 = 1.800
        - name: "east"
          robot_pose: {x: 1.800, y: 0.800, theta: 3.14159}
        # "west" access: robot_x = 1.500 - 0.30 = 1.200
        - name: "west"
          robot_pose: {x: 1.200, y: 0.800, theta: 0.0}

  # ── Starting positions ────────────────────────────────────────────────────
  starting_positions:
    yellow: {x: 0.350, y: 1.750, theta: 0.0}
    blue:   {x: 2.650, y: 1.750, theta: 3.14159}
